# ai-coding-ok: v3.0.0
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: "🔍 Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev tools
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check lib scripts tests

      - name: Check linting
        run: ruff check lib scripts tests

  test:
    name: "✅ Test"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pyyaml

      - name: Run tests with coverage
        run: pytest tests/ --cov=lib --cov=scripts --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: "🏗️ Skill Sanity Check"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Verify SKILL.md exists
        run: test -f SKILL.md || (echo 'SKILL.md is required for a Hermes Skill' && exit 1)

      - name: Verify SKILL.md frontmatter
        run: |
          head -1 SKILL.md | grep -q '^---$' || (echo 'SKILL.md must start with YAML frontmatter (---)' && exit 1)
          pip install pyyaml -q
          python3 - <<'EOF'
          import yaml, pathlib, sys
          text = pathlib.Path('SKILL.md').read_text()
          fm = yaml.safe_load(text.split('---')[1])
          desc = fm.get('description', '')
          if len(desc) > 1024:
              print(f'ERROR: description is {len(desc)} chars, must be <= 1024'); sys.exit(1)
          required = ['name', 'version', 'author', 'license']
          missing = [f for f in required if not fm.get(f)]
          if missing:
              print(f'ERROR: missing frontmatter fields: {missing}'); sys.exit(1)
          print(f'SKILL.md OK — name={fm["name"]}, description={len(desc)} chars')
          EOF
